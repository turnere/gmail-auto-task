name: Daily Gmail Scan

on:
  schedule:
    # 8:00 AM Central (CDT = 13:00 UTC; CST winter = 14:00 UTC, adjust then)
    - cron: '0 13 * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  scan-and-create-tasks:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm ci

      - name: Decode Google credentials
        run: |
          echo "${{ secrets.GOOGLE_CREDENTIALS }}" | base64 -d > credentials.json
          echo "${{ secrets.GOOGLE_TOKEN }}" | base64 -d > token.json

      - name: Run Gmail Auto-Task
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          HABITICA_USER_ID: ${{ secrets.HABITICA_USER_ID }}
          HABITICA_API_TOKEN: ${{ secrets.HABITICA_API_TOKEN }}
          HABITICA_TAG: 'Photography'
          HOURS_TO_LOOK_BACK: '24'
          CLAUDE_MODEL: 'claude-haiku-4-5-20251001'
          NODE_OPTIONS: '--dns-result-order=ipv4first'
        run: npm start
