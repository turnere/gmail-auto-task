# Home Assistant automations for PawSync.
# Add these to your automations.yaml or via the HA UI.

# ─── Sync toggle switches → input_text feed times ───────────────────────────

- id: pawsync_sync_toggles_to_times
  alias: "PawSync – Sync toggle switches to feed times"
  description: >
    When any individual feed-time toggle changes, rebuild the
    input_text.pawsync_feed_times string from the enabled toggles.
  trigger:
    - platform: state
      entity_id:
        - input_boolean.pawsync_feed_0500
        - input_boolean.pawsync_feed_0600
        - input_boolean.pawsync_feed_0700
        - input_boolean.pawsync_feed_1400
        - input_boolean.pawsync_feed_1500
        - input_boolean.pawsync_feed_1600
        - input_boolean.pawsync_feed_1700
        - input_boolean.pawsync_feed_1800
  condition:
    - condition: state
      entity_id: input_boolean.pawsync_enabled
      state: "on"
  action:
    - service: input_text.set_value
      target:
        entity_id: input_text.pawsync_feed_times
      data:
        value: >-
          {% set times = [] %}
          {% if is_state('input_boolean.pawsync_feed_0500', 'on') %}{% set times = times + ['05:00'] %}{% endif %}
          {% if is_state('input_boolean.pawsync_feed_0600', 'on') %}{% set times = times + ['06:00'] %}{% endif %}
          {% if is_state('input_boolean.pawsync_feed_0700', 'on') %}{% set times = times + ['07:00'] %}{% endif %}
          {% if is_state('input_boolean.pawsync_feed_1400', 'on') %}{% set times = times + ['14:00'] %}{% endif %}
          {% if is_state('input_boolean.pawsync_feed_1500', 'on') %}{% set times = times + ['15:00'] %}{% endif %}
          {% if is_state('input_boolean.pawsync_feed_1600', 'on') %}{% set times = times + ['16:00'] %}{% endif %}
          {% if is_state('input_boolean.pawsync_feed_1700', 'on') %}{% set times = times + ['17:00'] %}{% endif %}
          {% if is_state('input_boolean.pawsync_feed_1800', 'on') %}{% set times = times + ['18:00'] %}{% endif %}
          {{ times | join(',') }}

# ─── Sync schedule when the input_text changes ──────────────────────────────

- id: pawsync_sync_schedule
  alias: "PawSync – Sync schedule to API"
  description: >
    When you change the feed times or volume in the HA UI, push the
    new schedule to the PawSync API.
  trigger:
    - platform: state
      entity_id: input_text.pawsync_feed_times
    - platform: state
      entity_id: input_number.pawsync_chime_volume
  condition:
    - condition: state
      entity_id: input_boolean.pawsync_enabled
      state: "on"
  action:
    - service: rest_command.pawsync_update_schedule
      data:
        times: >-
          {{ states('input_text.pawsync_feed_times').split(',')
             | map('trim') | list | tojson }}
        volume: "{{ states('input_number.pawsync_chime_volume') | int }}"

# ─── Play chime on demand via a button ──────────────────────────────────────

- id: pawsync_manual_chime
  alias: "PawSync – Manual chime"
  description: "Trigger the feeder triangle chime immediately."
  trigger: []                    # call via service or button
  action:
    - service: rest_command.pawsync_play_chime

# ─── Alert if the PawSync API goes offline ──────────────────────────────────

- id: pawsync_offline_alert
  alias: "PawSync – API offline alert"
  trigger:
    - platform: state
      entity_id: sensor.pawsync_api_status
      to: "unavailable"
      for:
        minutes: 5
  action:
    - service: persistent_notification.create
      data:
        title: "PawSync Offline"
        message: >
          The PawSync API has been unreachable for 5 minutes.
          Check the Raspberry Pi and the `npm run api` process.
        notification_id: pawsync_offline
